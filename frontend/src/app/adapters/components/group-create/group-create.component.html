<div class="group-create-page">
  <article class="card group-create-card">
    <!-- Header -->
    <header class="card__header">
      <button 
        type="button"
        class="btn btn--ghost btn--back" 
        (click)="onCancel()"
        aria-label="Go back to groups list"
        data-testid="back-btn">
        ← Back
      </button>
      <h1 class="card__title">Create New Group</h1>
    </header>

    <div class="card__body">
      <!-- Error Message -->
      <div 
        *ngIf="error" 
        class="alert alert--error" 
        role="alert"
        data-testid="error-message">
        <span class="alert__content">{{ error }}</span>
      </div>

      <!-- Form -->
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form">
        <!-- Group Name -->
        <div class="form-group">
          <label for="name" class="form-group__label form-group__label--required">
            Group Name
          </label>
          <input
            type="text"
            id="name"
            formControlName="name"
            class="form-input"
            [class.form-input--error]="isInvalid('name')"
            placeholder="e.g., Family Secret Santa"
            aria-describedby="name-errors"
            data-testid="name-input"
          />
          <div id="name-errors" aria-live="polite">
            <span *ngIf="hasError('name', 'required')" class="form-error" data-testid="name-required-error">
              Group name is required
            </span>
            <span *ngIf="hasError('name', 'minlength')" class="form-error" data-testid="name-minlength-error">
              Name must be at least 3 characters
            </span>
            <span *ngIf="hasError('name', 'maxlength')" class="form-error" data-testid="name-maxlength-error">
              Name cannot exceed 100 characters
            </span>
          </div>
        </div>

        <!-- Description -->
        <div class="form-group">
          <label for="description" class="form-group__label">
            Description <span class="form-group__optional">(optional)</span>
          </label>
          <textarea
            id="description"
            formControlName="description"
            class="form-textarea form-textarea--sm"
            [class.form-textarea--error]="isInvalid('description')"
            placeholder="Add a description for your group..."
            rows="3"
            aria-describedby="description-hint description-errors"
            data-testid="description-input"
          ></textarea>
          <div class="form-group__footer">
            <div id="description-errors" aria-live="polite">
              <span *ngIf="hasError('description', 'maxlength')" class="form-error">
                Description cannot exceed 500 characters
              </span>
            </div>
            <span id="description-hint" class="form-group__char-count">
              {{ form.get('description')?.value?.length || 0 }}/500
            </span>
          </div>
        </div>

        <!-- Budget Limit -->
        <div class="form-group">
          <label for="budgetLimit" class="form-group__label form-group__label--required">
            Budget Limit ($)
          </label>
          <input
            type="number"
            id="budgetLimit"
            formControlName="budgetLimit"
            class="form-input"
            [class.form-input--error]="isInvalid('budgetLimit')"
            placeholder="50"
            min="0.01"
            step="0.01"
            aria-describedby="budget-errors"
            data-testid="budget-input"
          />
          <div id="budget-errors" aria-live="polite">
            <span *ngIf="hasError('budgetLimit', 'required')" class="form-error" data-testid="budget-required-error">
              Budget limit is required
            </span>
            <span *ngIf="hasError('budgetLimit', 'min')" class="form-error" data-testid="budget-min-error">
              Budget must be greater than 0
            </span>
          </div>
        </div>

        <!-- Form Actions -->
        <div class="form-actions form-actions--end">
          <button
            type="button"
            class="btn btn--secondary"
            (click)="onCancel()"
            [disabled]="isSubmitting"
            data-testid="cancel-btn">
            Cancel
          </button>
          <button
            type="submit"
            class="btn btn--primary"
            [class.btn--loading]="isSubmitting"
            [disabled]="form.invalid || isSubmitting"
            data-testid="submit-btn">
            <span class="btn__spinner" *ngIf="isSubmitting" aria-hidden="true"></span>
            <span>{{ isSubmitting ? 'Creating...' : 'Create Group' }}</span>
          </button>
        </div>
      </form>
    </div>
  </article>
</div>
